<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>DEM Falling Sphere Animation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f5f5f5;
    }

    canvas {
      background: white;
      border: 1px solid #bbb;
      display: block;
      margin-top: 16px;
    }

    button, input {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <h2>DEM Falling Sphere Animation</h2>

  <input type="file" id="csvFile" accept=".csv">
  <button id="playBtn">Play</button>
  <button id="pauseBtn">Pause</button>
  <button id="resetBtn">Reset</button>

  <p id="info">Load falling_sphere.csv</p>

  <canvas id="canvas" width="700" height="700"></canvas>
  
  <script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const info = document.getElementById("info");

  let frames = [];
  let frame = 0;
  let playing = false;

  const floorY = 620;
  const pixelsPerMeter = 280;
  const sphereRadiusPx = 18;
  const frameDelayMs = 40;

  function drawScene() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#222";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(60, floorY);
    ctx.lineTo(640, floorY);
    ctx.stroke();

    if (frames.length === 0) {
      ctx.fillStyle = "#555";
      ctx.fillText("Choose falling_sphere_cuda.csv", 250, 330);
      return;
    }

    const particles = frames[frame];

    for (const p of particles) {
      const screenX = 350 + p.x * pixelsPerMeter;
      const screenY = floorY - p.y * pixelsPerMeter;

      ctx.fillStyle = "#2f80ed";
      ctx.beginPath();
      ctx.arc(screenX, screenY, sphereRadiusPx, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#0f3f8c";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "white";
      ctx.font = "11px Arial";
      ctx.textAlign = "center";
      ctx.fillText(p.id, screenX, screenY + 4);
    }

    info.textContent =
      "time = " + particles[0].time.toFixed(3) +
      " s | particles = " + particles.length +
      " | frame = " + frame + " / " + (frames.length - 1);
  }

  function animate() {
    if (!playing) return;

    frame++;

    if (frame >= frames.length) {
      frame = frames.length - 1;
      playing = false;
      drawScene();
      return;
    }

    drawScene();

    setTimeout(() => {
      requestAnimationFrame(animate);
    }, frameDelayMs);
  }

  document.getElementById("csvFile").addEventListener("change", async function () {
    const text = await this.files[0].text();
    const lines = text.trim().split(/\r?\n/).slice(1);

    const rows = lines.map(line => {
      const [time, id, x, y, vx, vy, force_y] = line.split(",").map(Number);
      return { time, id, x, y, vx, vy, force_y };
    });

    const frameMap = new Map();

    for (const row of rows) {
      const key = row.time.toFixed(5);

      if (!frameMap.has(key)) {
        frameMap.set(key, []);
      }

      frameMap.get(key).push(row);
    }

    frames = Array.from(frameMap.values());

    frame = 0;
    playing = false;
    drawScene();
  });

  document.getElementById("playBtn").onclick = function () {
    if (frames.length === 0) return;
    if (playing) return;

    playing = true;
    requestAnimationFrame(animate);
  };

  document.getElementById("pauseBtn").onclick = function () {
    playing = false;
  };

  document.getElementById("resetBtn").onclick = function () {
    frame = 0;
    playing = false;
    drawScene();
  };

  drawScene();
</script>
  
</body>
</html>
